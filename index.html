<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weekly Schedule</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: sans-serif; background: #fff; padding: 1.5rem; }
  .schedule-wrap { padding: 1rem 0; }
  table { width: 100%; border-collapse: collapse; table-layout: fixed; }
  th, td { border: 0.5px solid #ddd; text-align: center; padding: 0; font-size: 13px; }
  th { background: #f5f5f3; color: #666; font-weight: 500; padding: 8px 4px; }
  .time-col { width: 72px; color: #888; font-size: 12px; background: #f5f5f3; padding: 6px 4px; }
  .block { border-radius: 6px; margin: 3px; padding: 8px 4px; font-size: 12px; font-weight: 500; line-height: 1.4; transition: opacity 0.2s, transform 0.1s; }
  .block.dimmed { opacity: 0.08; }
  .block.clickable { cursor: pointer; }
  .block.clickable:hover { transform: scale(1.03); filter: brightness(0.95); }
  .empty { height: 48px; }

  .c-school { background: #FAEEDA; color: #633806; }
  .c-fin    { background: #E6F1FB; color: #0C447C; }
  .c-fe     { background: #E1F5EE; color: #085041; }
  .c-factor { background: #FAECE7; color: #712B13; }
  .c-gv     { background: #FBEAF0; color: #72243E; }
  .c-py     { background: #EAF3DE; color: #27500A; }
  .c-stat   { background: #FCEBEB; color: #791F1F; }

  .legend { margin-top: 1rem; display: flex; gap: 8px; flex-wrap: wrap; font-size: 12px; }
  .legend-item {
    display: flex; align-items: center; gap: 6px;
    padding: 4px 10px; border-radius: 20px;
    border: 1.5px solid transparent;
    cursor: pointer; transition: opacity 0.15s, border-color 0.15s;
    user-select: none;
  }
  .legend-item:hover { opacity: 0.8; }
  .legend-item.active { border-color: #888; }
  .legend-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }

  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.35); z-index: 100;
    align-items: center; justify-content: center; padding: 1.5rem;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: #fff; border-radius: 14px; padding: 0;
    width: 100%; max-width: 500px; max-height: 88vh;
    overflow: hidden; display: flex; flex-direction: column;
    box-shadow: 0 8px 40px rgba(0,0,0,0.15);
  }
  .modal-header {
    padding: 1.2rem 1.4rem 1rem;
    border-bottom: 0.5px solid #eee;
    display: flex; justify-content: space-between;
    align-items: flex-start; gap: 1rem; flex-shrink: 0;
  }
  .modal-header-left { display: flex; flex-direction: column; gap: 4px; }
  .modal-course-tag {
    font-size: 11px; font-weight: 500; letter-spacing: 0.04em;
    padding: 2px 8px; border-radius: 20px; display: inline-block;
  }
  .modal-title { font-size: 17px; font-weight: 500; color: #1a1a1a; }
  .modal-date { font-size: 12px; color: #888; margin-top: 2px; }
  .modal-close {
    background: #f2f2f0; border: none; border-radius: 50%;
    width: 28px; height: 28px; font-size: 14px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    color: #666; flex-shrink: 0; margin-top: 2px;
  }
  .modal-close:hover { background: #e8e8e5; }
  .modal-body { overflow-y: auto; padding: 1rem 1.4rem 1.4rem; flex: 1; }
  .week-list { display: flex; flex-direction: column; gap: 6px; }
  .week-row {
    display: flex; align-items: flex-start; gap: 10px;
    padding: 8px 10px; border-radius: 8px;
    border: 0.5px solid #eee; transition: background 0.15s;
  }
  .week-row.current { border-color: transparent; }
  .week-num {
    font-size: 11px; font-weight: 500; color: #bbb;
    min-width: 36px; padding-top: 2px; flex-shrink: 0;
  }
  .week-row.current .week-num { color: inherit; opacity: 0.6; }
  .week-content { font-size: 13px; color: #333; line-height: 1.5; }
  .week-row.current .week-content { font-weight: 500; }
  .week-date-label { font-size: 11px; color: #bbb; margin-top: 2px; }
  .week-row.current .week-date-label { opacity: 0.65; }
  .current-badge {
    font-size: 10px; color: #fff;
    padding: 1px 6px; border-radius: 10px; margin-left: 6px;
    font-weight: 500; vertical-align: middle;
  }
</style>
</head>
<body>

    <tr>

<!-- Modal -->

  <div class="modal">

<script>

      { range: "2026/05/03–2026/05/09", content: "Figma 操作入門" },
      { range: "2026/05/10–2026/05/16", content: "Wireframe 線框圖設計實務" },
      { range: "2026/05/17–2026/05/23", content: "Mockup 視覺精稿設計實務" },
      { range: "2026/05/24–2026/05/30", content: "Prototype 互動原型設計實務" },
      { range: "2026/05/31–2026/06/06", content: "可用性測試方法：SUS 與 UEQ 實作" },
      { range: "2026/06/07–2026/06/13", content: "最終專案發表與評鑑" },
    ]
  },
  fe: {
    title: "財務工程",
    dayOfWeek: 2, // Tuesday in JS (0=Sun,1=Mon,2=Tue) — use Tuesday as primary
    color: { tag: "#E1F5EE", tagText: "#085041", current: "#C8EFE3", badge: "#1D9E75" },
    weeks: [
      { range: "2026/02/22–2026/02/28", content: "National Holiday, Online Lecture: Introduction" },
      { range: "2026/03/01–2026/03/07", content: "Review of option and Binomial-Tree model" },
      { range: "2026/03/08–2026/03/14", content: "Binomial-Tree model and Black-Scholes-Merton (BSM) formula" },
      { range: "2026/03/15–2026/03/21", content: "Computer workshop 1: Option pricing with Binomial-Tree model" },
      { range: "2026/03/22–2026/03/28", content: "Introduction to Brownian motion and Geometric Brownian motion" },
      { range: "2026/03/29–2026/04/04", content: "National Holiday and midterm exam (online)" },
      { range: "2026/04/05–2026/04/11", content: "Conditional Expectation, Martingale and Quadratic Variation (QV)" },
      { range: "2026/04/12–2026/04/18", content: "Computer workshop 2: Quadratic Variation and Realized Variance" },

    ]

    weeks: [
      { range: "2026/02/22–2026/02/28", content: "Introduction" },
      { range: "2026/03/01–2026/03/07", content: "Technical Analysis (I)" },

      { range: "2026/03/15–2026/03/21", content: "Technical Analysis (III)" },
      { range: "2026/03/22–2026/03/28", content: "Portfolio Analysis (with Generalized Sharpe Ratio): paper" },
      { range: "2026/03/29–2026/04/04", content: "Report for Asset Pricing Papers (II)" },
      { range: "2026/04/05–2026/04/11", content: "Report for Asset Pricing Papers (III)" },
      { range: "2026/04/12–2026/04/18", content: "Futures Strategies" },
      { range: "2026/04/19–2026/04/25", content: "Options Strategies" },
      { range: "2026/04/26–2026/05/02", content: "Midterm Exam" },
      { range: "2026/05/03–2026/05/09", content: "Option Pricing Theories: Black-Scholes Model and Put-Call Parity" },
      { range: "2026/05/10–2026/05/16", content: "Option Pricing with Greek Letters" },
      { range: "2026/05/17–2026/05/23", content: "Structured Notes Analysis (I)" },
      { range: "2026/05/24–2026/05/30", content: "Structured Notes Analysis (II)" },
      { range: "2026/05/31–2026/06/06", content: "Bond Analysis" },
      { range: "2026/06/07–2026/06/13", content: "Final Report (or Exam) I" },
    ]
  },
  fin: {
    title: "金融數據分析",
    dayOfWeek: 1, // Monday (JS: 1) and Friday — use Monday as primary
    color: { tag: "#E6F1FB", tagText: "#0C447C", current: "#C4DEFA", badge: "#378ADD" },
    weeks: [
      { range: "2026/02/22–2026/02/28", content: "National Holiday (online lecture: introduction)" },
      { range: "2026/03/01–2026/03/07", content: "Introduction and stylized facts of financial data" },

      { range: "2026/04/12–2026/04/18", content: "Computer Workshop 2: Estimating U-shape Intraday Volatility Pattern" },

      { range: "2026/05/17–2026/05/23", content: "High-frequency data: Testing for price jumps" },
      { range: "2026/05/24–2026/05/30", content: "Range-based GARCH model and generalized scaling factors" },
      { range: "2026/05/31–2026/06/06", content: "Range-based SV model and estimation using Kalman filter" },
      { range: "2026/06/07–2026/06/13", content: "Computer workshop 4" },
    ]
  }
};

const weekDayNames = ['週日','週一','週二','週三','週四','週五','週六'];

function parseRangeStart(range) {
  const part = range.replace(/[–—]/g, '|').split('|')[0].trim();
  const [y, m, d] = part.split('/').map(Number);
  return new Date(y, m - 1, d);
}

function formatDate(date) {
  return `${date.getFullYear()}/${String(date.getMonth()+1).padStart(2,'0')}/${String(date.getDate()).padStart(2,'0')}`;
}

// Week ranges start on Sunday. dayOfWeek uses JS convention: 0=Sun,1=Mon,2=Tue,3=Wed,4=Thu,5=Fri
function getClassDate(weekRange, dayOfWeek) {
  const sunday = parseRangeStart(weekRange);
  const d = new Date(sunday);
  d.setDate(d.getDate() + dayOfWeek);
  return d;
}

function getCurrentWeekIndex(weeks, dayOfWeek) {
  const today = new Date();
  for (let i = 0; i < weeks.length; i++) {
    const start = parseRangeStart(weeks[i].range);
    const end = new Date(start);
    end.setDate(end.getDate() + 6);
    if (today >= start && today <= end) return i;
  }
  return -1;
}

function openModal(key, dayOverride) {
  const s = syllabi[key];
  if (!s) return;

  const dayOfWeek = (dayOverride !== undefined) ? dayOverride : s.dayOfWeek;
  const currentIdx = getCurrentWeekIndex(s.weeks, dayOfWeek);
  const tag = document.getElementById('modal-tag');
  tag.textContent = s.title;
  tag.style.background = s.color.tag;
  tag.style.color = s.color.tagText;

  document.getElementById('modal-title').textContent = '16週課程內容';

  let dateStr = '';
  if (currentIdx >= 0) {
    const cd = getClassDate(s.weeks[currentIdx].range, dayOfWeek);
    dateStr = `本週上課日：${formatDate(cd)}（${weekDayNames[cd.getDay()]}）`;
  } else {
    dateStr = '課程已結束或尚未開始';
  }
  document.getElementById('modal-date').textContent = dateStr;

  const list = document.getElementById('week-list');
  list.innerHTML = '';

  s.weeks.forEach((w, i) => {
    const isCurrent = i === currentIdx;
    const cd = getClassDate(w.range, dayOfWeek);
    const row = document.createElement('div');
    row.className = 'week-row' + (isCurrent ? ' current' : '');
    if (isCurrent) {
      row.style.background = s.color.current;
      row.style.color = s.color.tagText;
    }
    row.innerHTML = `
      <div class="week-num" style="${isCurrent ? 'color:'+s.color.tagText : ''}">W${i+1}</div>
      <div style="flex:1;">
        <div class="week-content" style="${isCurrent ? 'color:'+s.color.tagText : ''}">
          ${w.content}${isCurrent ? `<span class="current-badge" style="background:${s.color.badge}">本週</span>` : ''}
        </div>
        <div class="week-date-label">${formatDate(cd)}（${weekDayNames[cd.getDay()]}）</div>
      </div>
    `;
    list.appendChild(row);
  });

  document.getElementById('modal-overlay').classList.add('open');
}

document.querySelectorAll('.block.clickable').forEach(block => {
  block.addEventListener('click', e => {
    e.stopPropagation();
    const key = block.dataset.syllabus;
    const dayOverride = block.dataset.day !== undefined ? parseInt(block.dataset.day) : undefined;
    if (key) openModal(key, dayOverride);
  });
});

document.getElementById('modal-close').addEventListener('click', () => {
  document.getElementById('modal-overlay').classList.remove('open');
});
document.getElementById('modal-overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('modal-overlay'))
    document.getElementById('modal-overlay').classList.remove('open');
});

// Legend filter
const legendItems = document.querySelectorAll('.legend-item');
const blocks = document.querySelectorAll('.block');
let active = null;
legendItems.forEach(item => {
  item.addEventListener('click', () => {
    const filter = item.dataset.filter;
    if (active === filter) {
      active = null;
      item.classList.remove('active');
      blocks.forEach(b => b.classList.remove('dimmed'));
    } else {
      active = filter;
      legendItems.forEach(i => i.classList.remove('active'));
      item.classList.add('active');
      blocks.forEach(b => {
        b.classList.toggle('dimmed', b.dataset.cat !== filter);
      });
    }
  });
});
</script>
</body>
</html>
